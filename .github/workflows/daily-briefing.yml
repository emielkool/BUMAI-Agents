name: Dagelijkse AI Briefing

on:
  # Maandag t/m vrijdag om 06:00 UTC = 08:00 CEST (zomer) / 07:00 CET (winter)
  schedule:
    - cron: '0 6 * * 1-5'

  # Handmatig starten via GitHub Actions UI (of voor specifieke datum)
  workflow_dispatch:
    inputs:
      datum:
        description: 'Datum om te genereren (YYYY-MM-DD) – leeg = vandaag'
        required: false
        default: ''

jobs:
  genereer-briefing:
    name: Genereer AI Dagbriefing
    runs-on: ubuntu-latest

    steps:
      - name: Repository uitchecken
        uses: actions/checkout@v4
        with:
          # Gebruik een PAT zodat de push ook nieuwe runs triggert
          # Gebruik anders GITHUB_TOKEN voor eenvoudiger setup
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Python 3.11 instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Briefing genereren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.datum }}" ]; then
            python generate_briefing.py "${{ github.event.inputs.datum }}"
          else
            python generate_briefing.py
          fi

      - name: Samenvatting tonen
        if: success()
        run: |
          DATUM=$(date +%Y-%m-%d)
          FILE="briefings/ai-briefing-${DATUM}.md"
          if [ -f "$FILE" ]; then
            echo "### ✅ Briefing gegenereerd" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Bestand: \`${FILE}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Eerste 20 regels:**" >> $GITHUB_STEP_SUMMARY
            echo '```markdown' >> $GITHUB_STEP_SUMMARY
            head -20 "$FILE" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
